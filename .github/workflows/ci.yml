name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out anki-addon-workbench
        uses: actions/checkout@v4
        with:
          path: anki-addon-workbench

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install system GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xdotool xvfb scrot

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Sync
        working-directory: anki-addon-workbench
        run: uv sync --frozen --extra dev --extra gui

      - name: Lint
        working-directory: anki-addon-workbench
        run: uv run --extra dev ruff check src tests

      - name: Type check
        working-directory: anki-addon-workbench
        run: uv run --extra dev mypy src

      - name: Unit tests
        working-directory: anki-addon-workbench
        run: uv run --extra dev --extra gui pytest

      - name: GUI tests on a virtual display
        working-directory: anki-addon-workbench
        run: xvfb-run -a uv run --extra dev --extra gui pytest tests/test_gui_xvfb.py -v

      - name: Render Dockerfile
        working-directory: anki-addon-workbench
        run: uv run anki-workbench dockerfile --out .tmp/anki-xvfb.Dockerfile

      - name: Docker build
        working-directory: anki-addon-workbench
        run: docker build -f .tmp/anki-xvfb.Dockerfile -t anki-addon-workbench-ci .

      - name: Anki GUI smoke
        working-directory: anki-addon-workbench
        run: docker run --rm -v "$PWD/..":/workspace -w /workspace/anki-addon-workbench anki-addon-workbench-ci
